name: Generate Architecture Diagrams

on:
  push:
    branches:
      - main
    # Watch all subdirectories inside diagrams/
    paths:
      - 'diagrams/**/*.py'
      - '.github/workflows/diagrams.yml'

jobs:
  build-diagrams:
    runs-on: ubuntu-latest
    
    # Grant permissions needed to commit changes back to the repo
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Graphviz is required at the OS level for the diagrams library to render
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Python dependencies
        run: pip install diagrams

      # Dynamically create matching image directories (e.g., images/phase1, images/phase2)
      - name: Ensure images directories exist
        run: |
          for dir in diagrams/*/; do
            mkdir -p "images/$(basename "$dir")"
          done

      # Find and run all Python scripts in any subdirectory of diagrams/
      - name: Generate Diagrams
        run: |
          find diagrams -name "*.py" -type f | while read -r script; do
            echo "Generating diagram for $script..."
            python "$script"
          done

      # Automatically commit any new or changed images in all subdirectories
      - name: Commit generated images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-update architecture diagrams"
          file_pattern: 'images/**/*.png'