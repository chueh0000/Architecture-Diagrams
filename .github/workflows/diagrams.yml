name: Generate Architecture Diagrams

on:
  push:
    branches:
      - main
    # Only run the action if files in the diagrams folder change
    paths:
      - 'diagrams/phase1/**.py'
      - '.github/workflows/diagrams.yml'

jobs:
  build-diagrams:
    runs-on: ubuntu-latest
    
    # Grant permissions needed to commit changes back to the repo
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Graphviz is required at the OS level for the diagrams library to render
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Python dependencies
        run: pip install diagrams

      - name: Ensure images directory exists
        run: mkdir -p images/phase1

      # Dynamically run all python scripts in the directory
      - name: Generate Diagrams
        run: |
          for script in diagrams/phase1/*.py; do
            python "$script"
          done

      # Automatically commit the new images back to the repository
      - name: Commit generated images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-update phase 1 architecture diagrams"
          # Updated to target the new images folder
          file_pattern: 'images/phase1/*.png'